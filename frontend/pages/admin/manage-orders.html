<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Admin</title>
    <link rel="stylesheet" href="../../css/admin-style.css">
</head>
<body class="admin-dashboard">
    <!-- Admin Navigation -->
    <nav class="admin-navbar">
        <div class="admin-nav-brand">💄 Admin Panel</div>
        <ul class="admin-nav-links">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="add-product.html">Add Product</a></li>
            <li><a href="manage-products.html">Manage Products</a></li>
            <li><a href="manage-categories.html">Categories</a></li>
            <li><a href="manage-orders.html" class="active">Orders</a></li>
            <li><a href="view-users.html">Users</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <main class="admin-content">
            <h2>Manage Orders</h2>
            
            <div class="filters">
                <select id="status-filter" class="filter-select">
                    <option value="all">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>

            <table id="orders-table" class="admin-table">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                    <!-- Orders will be loaded here -->
                </tbody>
            </table>
        </main>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
