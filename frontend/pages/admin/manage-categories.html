<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - Admin</title>
    <link rel="stylesheet" href="../../css/admin-style.css">
</head>
<body class="admin-dashboard">
    <!-- Admin Navigation -->
    <nav class="admin-navbar">
        <div class="admin-nav-brand">💄 Admin Panel</div>
        <ul class="admin-nav-links">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="add-product.html">Add Product</a></li>
            <li><a href="manage-products.html">Manage Products</a></li>
            <li><a href="manage-categories.html" class="active">Categories</a></li>
            <li><a href="manage-orders.html">Orders</a></li>
            <li><a href="view-users.html">Users</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <main class="admin-content">
            <h2>Manage Categories</h2>
            
            <form id="category-form" class="admin-form">
                <h3>Add New Category</h3>
                <div class="form-group">
                    <label for="cat-name">Category Name *</label>
                    <input type="text" id="cat-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="cat-desc">Description</label>
                    <textarea id="cat-desc" name="description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Add Category</button>
                <div id="message" class="message"></div>
            </form>

            <h3>Categories List</h3>
            <table id="categories-table" class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Category Name</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="categories-body">
                    <!-- Categories will be loaded here -->
                </tbody>
            </table>
        </main>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
