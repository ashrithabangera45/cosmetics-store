<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Users - Admin</title>
    <link rel="stylesheet" href="../../css/admin-style.css">
</head>
<body class="admin-dashboard">
    <!-- Admin Navigation -->
    <nav class="admin-navbar">
        <div class="admin-nav-brand">💄 Admin Panel</div>
        <ul class="admin-nav-links">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="add-product.html">Add Product</a></li>
            <li><a href="manage-products.html">Manage Products</a></li>
            <li><a href="manage-categories.html">Categories</a></li>
            <li><a href="manage-orders.html">Orders</a></li>
            <li><a href="view-users.html" class="active">Users</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <main class="admin-content">
            <h2>View Users</h2>
            
            <div class="search-bar">
                <input type="text" id="search" placeholder="Search users...">
                <button class="btn btn-primary">Search</button>
            </div>

            <table id="users-table" class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </main>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
